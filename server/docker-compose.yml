version: "3.9"

services:
  backend:
    build: .
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: sh -c "npx prisma migrate deploy && node index.js"  
    depends_on:
      - db

  db:
    image: postgres
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: aditya
      POSTGRES_PASSWORD: "@Aditya7078"
      POSTGRES_DB: sportz
    ports:
      - "5432:5432"